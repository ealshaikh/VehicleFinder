version: "3.9"

services:
  backend:
    build:
      context: ./VehicleDataAPI
    image: vehicle-backend
    ports:
      - "7100:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080

  frontend:
    build:
      context: ./frontend/vehicle-frontend
    image: vehicle-frontend
    ports:
      - "4200:80"