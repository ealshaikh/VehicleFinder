<label for="year" class="me-2 fw-5">Model Year</label>
<mat-form-field appearance="outline" class="width-70">
  <input
    matInput
    type="number"
    id="year"
    [min]="1900"
    [max]="currentYear"
    placeholder="Enter year"
    [(ngModel)]="year"
  />
</mat-form-field>

<button
  mat-raised-button
  color="primary"
  type="button"
  (click)="onFind()"
  class="ms-2"
>
  Find Vehicle
</button>
