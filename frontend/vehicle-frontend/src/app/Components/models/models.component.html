<label for="year" class="me-2 fw-5">Model Year</label>
<input
  id="year"
  type="number"
  pInputText
  [(ngModel)]="year"
  min="1900"
  [max]="currentYear"
  placeholder="Enter year"
/>
<button
  type="button"
  label="Find"
  (click)="onFind()"
  class="btn btn-secondary ms-2"
>
  Find Vehicle
</button>
