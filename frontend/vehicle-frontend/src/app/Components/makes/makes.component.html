<div class="makes-container">
  <label for="make">Select Car Make</label>
  <p-autoComplete
    id="make"
    [(ngModel)]="selectedMake"
    [suggestions]="makes"
    (completeMethod)="searchMakes($event)"
    (onSelect)="onMakeSelect()"
    field="makeName"
    placeholder="Type to search car makes..."
    [minLength]="2"
    [showEmptyMessage]="true"
    emptyMessage="No results found">
  </p-autoComplete>
</div>
