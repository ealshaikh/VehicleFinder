<div class="container-fluid py-4">
  <!-- Header -->
  <div class="row header-row">
    <div class="col-12">
      <h1>Welcome to Car Finder</h1>
      <p>Find car models by make and year</p>
    </div>
  </div>

  <!-- Input Section -->
  <div class="row g-4 justify-content-center mb-5">
    <div class="col-md-4 d-flex justify-content-center">
      <app-makes (makeSelected)="onMakeSelected($event)"></app-makes>
    </div>

    <div class="col-md-4 d-flex justify-content-center">
      <app-vehicles [selectedMake]="selectedMake"></app-vehicles>
    </div>

    <div class="col-md-4 d-flex justify-content-center">
      <app-models
        [selectedMake]="selectedMake"
        (modelsFetched)="onModelsFetched($event)"
      ></app-models>
    </div>
  </div>

  <!-- Results Table -->
  <div class="row">
    <div class="col-12">
      <section class="results-section" *ngIf="models.length > 0">
        <table
          mat-table
          [dataSource]="models"
          class="mat-elevation-z4 table-modern"
        >
          <ng-container matColumnDef="make">
            <th mat-header-cell *matHeaderCellDef>Make</th>
            <td mat-cell *matCellDef="let model">{{ model.make_Name }}</td>
            <td mat-footer-cell *matFooterCellDef></td>
          </ng-container>

          <ng-container matColumnDef="model">
            <th mat-header-cell *matHeaderCellDef>Model</th>
            <td mat-cell *matCellDef="let model">{{ model.model_Name }}</td>
            <td mat-footer-cell *matFooterCellDef class="text-end fw-bold">
              Total records: {{ models.length }}
            </td>
          </ng-container>

          <tr
            mat-header-row
            *matHeaderRowDef="displayedColumns"
            class="table-header"
          ></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns"
            class="table-row"
          ></tr>
          <tr
            mat-footer-row
            *matFooterRowDef="footerColumns"
            class="table-total"
          ></tr>
        </table>
      </section>
    </div>
  </div>
</div>
